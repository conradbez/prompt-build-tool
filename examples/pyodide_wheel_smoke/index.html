<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pbt Wheel Smoke Test</title>
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2025.11.2/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2025.11.2/core.js"
    ></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2ea;
        --panel: #fbfdf9;
        --ink: #172119;
        --muted: #556257;
        --accent: #295f3a;
        --ok: #1e6b3e;
        --fail: #8e2424;
        --border: #c8d4c8;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(41, 95, 58, 0.12), transparent 28%),
          linear-gradient(180deg, #f7faf4 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Libre Baskerville", Georgia, serif;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 56px 20px 80px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.25rem, 5vw, 3.8rem);
        line-height: 0.96;
      }

      p {
        color: var(--muted);
        font-size: 1.03rem;
      }

      .panel {
        margin-top: 28px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(23, 33, 25, 0.06);
      }

      .status {
        margin: 0 0 18px;
        font: 700 1rem/1.2 "Helvetica Neue", sans-serif;
      }

      .ok {
        color: var(--ok);
      }

      .fail {
        color: var(--fail);
      }

      pre {
        margin: 0;
        overflow-x: auto;
        padding: 18px;
        border-radius: 14px;
        background: #1d241f;
        color: #f4f8f1;
        font: 0.92rem/1.5 "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>pbt wheel smoke test</h1>
      <p>
        This page installs the built <code>prompt-build-tool</code> wheel into PyScript,
        imports <code>pbt</code>, and runs a minimal <code>models_from_dict</code> graph
        automatically. There is no button wiring or JS-to-Python event bridge.
      </p>

      <section class="panel">
        <p id="status" class="status">Booting PyScript runtime...</p>
      </section>

      <section class="panel">
        <pre id="output">Waiting for Python...</pre>
      </section>
    </main>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
  </body>
</html>
